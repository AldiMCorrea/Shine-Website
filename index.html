<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shine Nails - E-commerce</title>
  <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<!-- Agregar Google Fonts Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Enlace al archivo CSS externo -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black">
  <div class="container-fluid">
    <!-- Izquierda: Servicios, Dudas, Colecciones -->
    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="#" data-translate="navbar_services">OUR SERVICES</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-translate="navbar_doubts">DOUBTS</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" data-translate="navbar_collections">COLLECTIONS</a>
        </li>
      </ul>

    <!-- Centro: Logo -->
    <a class="navbar-brand mx-auto" href="#">
      <img src="img/shinelogo.svg" alt="Logo" class="logo">
    </a>

  <!-- Derecha: Idioma y Iconos -->
  <div class="d-flex align-items-center">
    <!-- Selector de idioma -->
    <div class="dropdown me-3">
      <button class="btn btn-secondary dropdown-toggle" type="button" id="languageDropdown" data-bs-toggle="dropdown" aria-expanded="false">
        <img src="https://flagcdn.com/w40/us.png" alt="English"> <span>English</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageDropdown">
        <li><a class="dropdown-item" href="#" data-lang="en"><img src="https://flagcdn.com/w40/us.png" alt="English"> English</a></li>
        <li><a class="dropdown-item" href="#" data-lang="es"><img src="https://flagcdn.com/w40/es.png" alt="Español"> Español</a></li>
      </ul>
    </div>

    <!-- Iconos de Usuario, Buscar y Carrito -->
    <a href="#" class="btn btn-outline-light me-2">
      <i class="bi bi-person"></i>
    </a>
    <a href="#" class="btn btn-outline-light me-2">
      <i class="bi bi-search"></i>
    </a>
    <a href="#" class="btn btn-outline-light">
      <i class="bi bi-cart"></i>
    </a>
  </div>
</div>
</nav>

<!-- Video Promocional -->
<div class="video-container">
    <video autoplay loop muted playsinline class="w-100" id="promoVideo">
      <source src="img/VideoPromoShine.mp4">
      Your browser does not support the video tag.
    </video>
    <div class="social-icons">
      <a href="https://www.instagram.com/" target="_blank">
        <i class="bi bi-instagram"></i>
      </a>
      <a href="https://www.whatsapp.com/" target="_blank">
        <i class="bi bi-whatsapp"></i>
      </a>
      <a href="https://www.tiktok.com/" target="_blank">
        <i class="bi bi-tiktok"></i>
      </a>
    </div>
  </div>
<!-- Carrusel -->
<div id="cardCarousel" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <div class="card" style="width: 18rem;">
        <img src="img/img1.svg" class="card-img-top" alt="Product 1">
        <div class="card-body">
          <h5 class="card-title">Product Title 1</h5>
          <a href="#" class="btn shop-now-btn">Shop Now</a>
        </div>
      </div>
    </div>
    <div class="carousel-item">
      <div class="card" style="width: 18rem;">
        <img src="img/img2.svg" class="card-img-top" alt="Product 2">
        <div class="card-body">
          <h5 class="card-title">Product Title 2</h5>
          <a href="#" class="btn shop-now-btn">Shop Now</a>
        </div>
      </div>
    </div>
    <div class="carousel-item">
      <div class="card" style="width: 18rem;">
        <img src="img/img3.svg" class="card-img-top" alt="Product 3">
        <div class="card-body">
          <h5 class="card-title">Product Title 3</h5>
          <a href="#" class="btn shop-now-btn">Shop Now</a>
        </div>
      </div>
    </div>
    <div class="carousel-item">
      <div class="card" style="width: 18rem;">
        <img src="img/img4.svg" class="card-img-top" alt="Product 4">
        <div class="card-body">
          <h5 class="card-title">Product Title 4</h5>
          <a href="#" class="btn shop-now-btn">Shop Now</a>
        </div>
      </div>
    </div>
    <div class="carousel-item">
      <div class="card" style="width: 18rem;">
        <img src="img/img5.svg" class="card-img-top" alt="Product 5">
        <div class="card-body">
          <h5 class="card-title">Product Title 5</h5>
          <a href="#" class="btn shop-now-btn">Shop Now</a>
        </div>
      </div>
    </div>
    <div class="carousel-item">
      <div class="card" style="width: 18rem;">
        <img src="img/img6.svg" class="card-img-top" alt="Product 6">
        <div class="card-body">
          <h5 class="card-title">Product Title 6</h5>
          <a href="#" class="btn shop-now-btn">Shop Now</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Controles del Carrusel -->
  <button class="carousel-control-prev" type="button" data-bs-target="#cardCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#cardCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Bootstrap Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<!-- Enlace al archivo JavaScript para cambio de idioma -->
<script src="js/index.js"></script>

</body>
</html>
